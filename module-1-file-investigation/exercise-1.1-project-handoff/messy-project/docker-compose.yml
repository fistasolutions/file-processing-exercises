version: '3.8'

services:
  app:
    build: .
    ports:
      - "${PORT:-5000}:8080"
    env_file:
      - config/dev.env
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
